name: Codex Fix

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-fix:
    if: github.event.label.name == 'codex-fix'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Codex Fix
        uses: openai/codex-action@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Read AGENTS.md.

            Fix the smallest possible issue in this PR.

            Rules:
            - Do not expand scope.
            - Do not add dependencies unless necessary.
            - Add or update tests.
            - Run available checks.
            - If blocked, explain why.
            - Do not rewrite unrelated files.
