name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Codex PR Review
        uses: openai/codex-action@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Read AGENTS.md.

            Review this pull request against:
            - approved requirements
            - approved product plan
            - approved UI plan
            - approved tech plan

            Focus on requirement match, UI/UX match, code quality, tests, security, performance, and maintainability.

            Post a concise PR review with blocking issues, non-blocking suggestions, missing tests, and final recommendation.
