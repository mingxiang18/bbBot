#----------------------必须配置--------------------------------------------------------
bot:
  #类型：onebot（oneBot规范机器人），qqnt，qq（QQ官方机器人）
  onebot:
    #自定义机器人名称
    bot1:
      #是否启用
      enable: false
      #机器人的qq号
      qq: 111111111
      #机器人的webSocket配置
      webSocket:
        #作为服务端提供ws服务可配置
        server:
          # 服务端的端口号
          port: 8888

    bot2:
      #是否启用
      enable: false
      #机器人的qq号
      qq: 222222222
      #机器人的webSocket配置
      webSocket:
        #作为客户端接入ws服务
        client:
          # 需要连接的ws地址
          serverUrl: ws://localhost:3001

  #类型：qq（QQ官方机器人）
  qq:
    #自定义机器人名称
    bot3:
      #是否启用
      enable: false
      #qq官方机器人必须配置
      appId:
      clientSecret:

  #类型：telegram（Telegram Bot API webhook）
  telegram:
    #自定义机器人名称，webhook地址为 /telegram/{botName}/webhook
    bot4:
      #是否启用
      enable: false
      #BotFather生成的token
      token:
      #bot用户名，不带@
      botUsername:
      #Telegram Bot API地址，默认 https://api.telegram.org
      baseUrl: https://api.telegram.org
      #setWebhook时传入的secret_token，用于校验回调请求头
      secretToken:

  #类型：discord（Discord Bot Gateway）
  discord:
    #自定义机器人名称
    bot5:
      #是否启用
      enable: false
      #Discord Developer Portal生成的bot token
      token:
      #bot用户id，可选；不填时使用登录后的self user id
      botUserId:
      #是否处理私聊消息
      enableDirectMessage: true

# 数据库配置
mysql:
  address: localhost:3306/bb_bot
  username: root
  password: root

file:
  #静态文件保存目录
  path: /bot/static/

#----------------------可选配置--------------------------------------------------------
# 服务配置
server:
  # 服务器的ip
  ip: 127.0.0.1
  # 服务器的HTTP端口，默认为8080
  port: 8199

spring:
  #配置文件
  profiles:
    active: local
  #导入 prompt 配置文件，所有 prompt 见 prompts.yml
  config:
    import: optional:classpath:prompts.yml
  #mysql druid数据源相关配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    druid:
      url: jdbc:mysql://${mysql.address}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&rewriteBatchedStatements=true
      username: ${mysql.username}
      password: ${mysql.password}
      # 初始连接数
      initialSize: 10
      # 最小连接池数量
      minIdle: 10
      # 最大连接池数量
      maxActive: 30
      # 配置获取连接等待超时的时间
      maxWait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      timeBetweenEvictionRunsMillis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      minEvictableIdleTimeMillis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      maxEvictableIdleTimeMillis: 900000
      # 配置检测连接是否有效
      validationQuery: SELECT 1 FROM DUAL
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      webStatFilter:
        enabled: false
      statViewServlet:
        enabled: false

rest:
  # 代理相关配置
  proxyIp:
  proxyPort:

#ai聊天相关配置
aiChat:
  #如果为0则不回复，否则随机一个0-1之间的数，回复数值大于此数值则回复
  replyNum: 0.95d
  #群聊未@时触发自动回复的阈值（>该值才回复）
  autoReplyRate: 0.99d
  #ai回复时携带的历史消息条数
  chatHistoryNum: 10
  #具有线索管理权限的用户ID列表
  adminUserIds:
  #直接对话（私聊/@机器人）时是否给模型挂载工具，使其能自行判断聊天还是干活；关闭则退化为纯聊天机器人
  toolsEnabled: true

# AI 模型调用配置
# active-provider 决定调用哪家：openai / deepseek
ai:
  active-provider: openai
  providers:
    openai:
      base-url: https://api.openai.com/v1
      api-key:
      model: gpt-4
      vision-enable: false
    deepseek:
      base-url: https://api.deepseek.com/v1
      api-key:
      model: deepseek-chat
      vision-enable: false
  retry:
    max-attempts: 3
    initial-interval-ms: 500
    multiplier: 2.0
    max-interval-ms: 4000

# 旧版 chatGPT.* 配置（已废弃，保留兼容期。请迁移至上面的 ai.providers.openai.*）
chatGPT:
  apiKey:
  # 启用 SSE 流式回复 + IM 端 edit/chunked 呈现。默认关闭以兼容现有部署。
  streamEnabled: false

# AI Agent（远程派活 + 工具调用 + cron + 插件）相关配置
aiAgent:
  # 拥有完全权限的用户 id，逗号分隔。仅这些用户能授予角色、跑 shell_exec、加 cron 等。
  owners: 1105048721
  # 工具调用循环硬上限，避免 LLM 跑飞
  maxSteps: 10
  # 一轮里多个无依赖的工具调用是否并发执行
  toolParallel: true
  # 会话内上下文压缩：工具循环上下文超过 thresholdChars 字符时，把早期内容蒸馏成摘要
  compact:
    thresholdChars: 40000
    keepChars: 12000
  # 启动时自动 CREATE TABLE IF NOT EXISTS ai_user_role / ai_tool_policy / ai_tool_invocation_log / ai_cron_task
  autoCreateTables: true
  # 沙箱
  sandbox:
    # auto / bubblewrap / docker / noop
    preferred: auto
    # docker 后端用什么镜像
    dockerImage: alpine:3.20
  # 插件目录（jar 放进去即可）
  pluginDir: ./plugins
  # cron 派活时 LLM 的 system prompt（可覆盖）
  cron:
    maxSteps: 10

# 总结聊天记录拉取的历史长度
chatHistory:
  summary:
    chatHistoryNum: 100

tencent:
  #腾讯云对象存储配置
  cos:
    secretId:
    secretKey:

#文件服务器相关配置
fileClient:
  # local (默认本地存储，没有文件服务器)，sftp (sftp作为文件服务), tencentCos(腾讯云对象存储，但是qq官方机器人访问自己家腾讯云对象存储的外链会说ip被ban就离谱)
  type: local

